name: Z2-Final-Super-Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Code Checkout
        uses: actions/checkout@v4

      - name: 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. NASA Project Structure (Zero Error Mode)
        run: |
          mkdir -p app/src/main/java/com/zeeshan/chat
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # settings.gradle
          echo "include ':app'" > settings.gradle

          # app/build.gradle (FIX: No more DependencyHandler error)
          cat <<EOF > app/build.gradle
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'com.zeeshan.chat'
              compileSdk 33
              defaultConfig {
                  applicationId "com.zeeshan.chat"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0-Z2-Final"
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          # Manifest (NASA Style Fullscreen)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Zeeshan Chat Z+2"
                  android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # Strings Setup
          echo '<resources><string name="app_name">Zeeshan Chat Z+2</string></resources>' > app/src/main/res/values/strings.xml

          # MainActivity Java (Z+2 Logic Engine)
          cat <<EOF > app/src/main/java/com/zeeshan/chat/MainActivity.java
          package com.zeeshan.chat;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  // Layout hum baad mein aur matrix jaisa banayenge
                  setContentView(new android.view.View(this)); 
              }
          }
          EOF

      - name: 4. Build Real Binary APK
        run: |
          gradle wrapper --gradle-version 8.1
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 5. Upload Final Z+2 APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z2-Real-App
          path: app/build/outputs/apk/debug/app-debug.apk
