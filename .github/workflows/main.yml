name: Zeeshan chat Z+2 Auto-Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4

      - name: Java Setup
        uses: actions/setup-java@v4 # Updated to v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK Setup
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4 # Yahan v3 ki jagah v4 kar diya hai
        with:
          name: Zeeshan-chat-Z+2-App
          path: app/build/outputs/apk/debug/app-debug.apk
