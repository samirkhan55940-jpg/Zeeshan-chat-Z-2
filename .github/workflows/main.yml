name: Z2-Master-Final-Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Code Download
        uses: actions/checkout@v4

      - name: 2. Java Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. NASA Z2 Structure Setup
        run: |
          # Sabse pehle purani galat files ko saaf karna
          rm -rf app build.gradle settings.gradle
          
          # Folders banana
          mkdir -p app/src/main/java/com/zeeshan/chat
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Root build.gradle (Bilkul simple)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # settings.gradle
          echo "include ':app'" > settings.gradle

          # app/build.gradle (FIX: Isse Dependency error nahi aayega)
          cat <<EOF > app/build.gradle
          apply plugin: 'com.android.application'
          android {
              namespace 'com.zeeshan.chat'
              compileSdk 33
              defaultConfig {
                  applicationId "com.zeeshan.chat"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0-Z2"
              }
          }
          EOF

          # Manifest (App ki pehchan)
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application android:label="Zeeshan Chat Z+2">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity Java (Brain logic)
          cat <<EOF > app/src/main/java/com/zeeshan/chat/MainActivity.java
          package com.zeeshan.chat;
          import android.os.Bundle;
          import android.app.Activity;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
              }
          }
          EOF

      - name: 4. Build Real APK
        run: |
          gradle wrapper --gradle-version 8.1
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: 5. Upload Working APK
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Z2-Real-APK
          path: app/build/outputs/apk/debug/app-debug.apk

