name: Zeeshan-Chat-Z2-Final-Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Code Checkout
        uses: actions/checkout@v4

      - name: 2. Java 17 Setup
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 3. Fix Permissions & Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.1
          fi
          chmod +x gradlew

      - name: 4. Build Real APK
        # Ye step aapke code ko compile karke asli APK banayega
        run: ./gradlew assembleDebug

      - name: 5. Upload Working Z+2 APK
        # Naya v4 version use kiya hai taaki purana error na aaye
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-Chat-Z2-App
          path: app/build/outputs/apk/debug/app-debug.apk
