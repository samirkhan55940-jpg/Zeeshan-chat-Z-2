name: Zeeshan-chat-Z2-Real-Builder

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Code ko uthana
        uses: actions/checkout@v4

      - name: Java Setup (Z+2 Engine)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android Structure Setup
        run: |
          mkdir -p app/src/main/java/com/zeeshan/chat
          mkdir -p app/src/main/res/layout
          
          # Root build.gradle
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # settings.gradle
          echo "include ':app'" > settings.gradle

          # app/build.gradle
          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.zeeshan.chat'
              compileSdk 33
              defaultConfig {
                  applicationId "com.zeeshan.chat"
                  minSdk 24
                  targetSdk 33
                  versionCode 1
                  versionName "1.0-Z2"
              }
          }
          EOF

          # Manifest Fix
          mkdir -p app/src/main/
          cat <<EOF > app/src/main/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="Zeeshan Chat Z+2"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Build Real APK
        run: |
          gradle wrapper --gradle-version 8.1
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload Asli Zeeshan chat Z+2
        uses: actions/upload-artifact@v4
        with:
          name: Zeeshan-chat-Z+2-Real-APK
          path: app/build/outputs/apk/debug/app-debug.apk
